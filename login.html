<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeDoc AI — Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="pagina-login">

    <div class="login-box">

        <div class="login-logo">
            <h1>SafeDoc <span>AI</span></h1>
            <p>Gestão de documentos para franquias</p>
        </div>

        <div id="erro-login" class="mensagem-erro" style="display:none;">
            Email ou senha inválidos.
        </div>

        <div class="campo">
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="seu@email.com">
        </div>

        <div class="campo">
            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="••••••">
        </div>

        <button class="btn-primario" onclick="fazerLogin()">Entrar</button>

        <p class="login-rodape">
            SafeDoc AI © 2025 — Todos os direitos reservados
        </p>

    </div>

    <script src="js/main.js"></script>
</body>
</html>
