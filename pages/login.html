<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | SafeDoc AI</title>
  <link rel="stylesheet" href="../css/reset.css" />
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/pages.css" />
</head>
<body class="auth-body">
  <main class="auth-shell">
    <section class="auth-left">
      <div class="auth-kicker">Compliance operacional para franquias</div>
      <h1 class="auth-title">SafeDoc AI</h1>
      <p class="auth-text">Centralize documentos obrigatórios, acompanhe vencimentos e reduza riscos nas unidades.</p>
    </section>

    <section class="auth-card">
      <div class="auth-grid">
        <h2>Acessar<br />sistema</h2>
        <p>Entre com seu e-mail corporativo e senha.</p>
      </div>

      <form action="dashboard.html">
        <div class="form-group">
          <label class="form-label" for="email">E-mail</label>
          <input class="input" id="email" type="email" placeholder="franqueador@safedoc.ai" />
        </div>

        <div class="spacer-16"></div>

        <div class="form-group">
          <label class="form-label" for="senha">Senha</label>
          <input class="input" id="senha" type="password" placeholder="Digite sua senha" />
        </div>

        <div class="auth-error">Exemplo visual: e-mail ou senha inválidos.</div>

        <button class="btn btn-primary" style="width:100%" type="submit">Entrar</button>
      </form>
    </section>
  </main>
</body>
</html>
